syntax = "proto3";

package minipulsar;

// Common types
enum NodeType {
	NODE_TYPE_UNSPECIFIED = 0;
	NODE_TYPE_BROKER = 1;
	NODE_TYPE_STORAGE = 2;
	NODE_TYPE_PRODUCER = 3;
	NODE_TYPE_CONSUMER = 4;
}

enum Status {
	STATUS_UNSPECIFIED = 0;
	STATUS_OK = 1;
	STATUS_REDIRECT = 2;
	STATUS_ERROR = 3;
}

message BrokerInfo {
	string broker_id = 1;
	string address = 2;
}

message StorageInfo {
	string storage_id = 1;
	string address = 2;
}

message PartitionRoute {
	string topic = 1;
	uint32 partition = 2;
	BrokerInfo broker = 3;
	StorageInfo storage = 4;
}

message PartitionOffset {
	uint32 partition = 1;
	uint64 offset = 2;
}

message Message {
	string topic = 1;
	uint32 partition = 2;
	uint64 offset = 3;
	string key = 4;
	bytes payload = 5;
}

message MessageBatch {
	repeated Message messages = 1;
}

// Coordinator service
service CoordinatorService {
	rpc Register(RegisterRequest) returns (RegisterResponse);
	rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
	rpc CreateTopic(CreateTopicRequest) returns (CreateTopicResponse);
	rpc SubscribeMessage(SubscribeMessageRequest) returns (SubscribeMessageResponse);
	rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse);
	rpc GetRoutingTable(GetRoutingTableRequest) returns (GetRoutingTableResponse);
	rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
	rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}

message RegisterRequest {
	NodeType node_type = 1;
	string node_id = 2;
	string address = 3;
}

message RegisterResponse {
	bool ok = 1;
	string message = 2;
	string node_id = 3;
}

message HeartbeatRequest {
	string broker_id = 1;
	string address = 2;
}

message HeartbeatResponse {
	bool ok = 1;
	string message = 2;
}

message CreateTopicRequest {
	string topic_name = 1;
}

message CreateTopicResponse {
	BrokerInfo default_broker = 1;
	repeated PartitionRoute routes = 2;
}

message SubscribeMessageRequest {
	string topic_name = 1;
}

message SubscribeMessageResponse {
	Status status = 1;
	string error_message = 2;
	repeated PartitionRoute routes = 3;
}

message ListTopicsRequest {}

message ListTopicsResponse {
	Status status = 1;
	string error_message = 2;
	repeated string topics = 3;
}

message GetRoutingTableRequest {}

message GetRoutingTableResponse {
	repeated PartitionRoute routes = 1;
}

message RequestVoteRequest {
	uint64 term = 1;
	string candidate_id = 2;
}

message RequestVoteResponse {
	uint64 term = 1;
	bool vote_granted = 2;
}

message AppendEntriesRequest {
	uint64 term = 1;
	string leader_id = 2;
	string state_json = 3;
}

message AppendEntriesResponse {
	uint64 term = 1;
	bool success = 2;
}

// Broker service
service BrokerService {
	rpc Publish(PublishRequest) returns (PublishResponse);
	rpc AssignPartition(AssignPartitionRequest) returns (AssignPartitionResponse);
	rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse);
}

message PublishRequest {
	string topic = 1;
	string key = 2;
	bytes payload = 3;
}

message PublishResponse {
	Status status = 1;
	uint32 partition = 2;
	uint64 offset = 3;
	BrokerInfo redirect_broker = 4;
	string error_message = 5;
}

message AssignPartitionRequest {
	string topic = 1;
	uint32 partition = 2;
	StorageInfo storage = 3;
	repeated PartitionRoute routes = 4;
}

message AssignPartitionResponse {
	bool ok = 1;
	string message = 2;
}

message SubscribeRequest {
	string topic = 1;
	string consumer_id = 2;
	repeated PartitionOffset start_offsets = 3;
}

message SubscribeResponse {
	Status status = 1;
	oneof payload {
		MessageBatch batch = 2;
		BrokerInfo redirect_broker = 3;
		string error_message = 4;
	}
}

// Storage service
service StorageService {
	rpc Append(AppendRequest) returns (AppendResponse);
	rpc Read(ReadRequest) returns (ReadResponse);
}

message AppendRequest {
	string topic = 1;
	uint32 partition = 2;
	string key = 3;
	bytes payload = 4;
}

message AppendResponse {
	uint64 offset = 1;
}

message ReadRequest {
	string topic = 1;
	uint32 partition = 2;
	uint64 offset = 3;
	uint32 batch_size = 4;
}

message ReadResponse {
	repeated Message messages = 1;
	uint64 next_offset = 2;
}
